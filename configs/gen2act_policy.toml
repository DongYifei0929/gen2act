[model]
num_action_dims = 6
num_bins = 256
image_size = 224
patch_size = 16
hidden_dim = 768
num_vit_layers = 12
num_vit_heads = 12
latent_tokens = 16
# pretrained = "dinov2"  # uncomment to use DINOv2 ViT-B/14

[data]
dataset_type = "lerobot"
dataset_path = "dataset/franka-mimicgen"
lerobot_use_videos = true
lerobot_video_key = "observation.images.table_cam"  
lerobot_timestamp_key = "timestamp"
human_camera = "table_cam"
robot_camera = "table_cam"
human_video_len = 16
robot_history_len = 8
image_size = 224
action_stride = 1
max_samples = 20000
gripper_threshold = 0.0

[train]
batch_size = 4
epochs = 5
lr = 0.001
weight_decay = 0.0001
seed = 42
val_split = 0.05
num_workers = 0
log_every = 10
save_every = 1
output_dir = "outputs/gen2act_policy"
debug_isfinite = true
debug_norms = true
debug_norm_every = 10  

[track]
enable = false
offline = true
use_hub = true
checkpoint = ""
grid_size = 10
grid_query_frame = 0
backward_tracking = false
window_len = 60
use_v2_model = false

[wandb]
enabled = false
project = "gen2act"
# entity = "your_wandb_entity"
# run_name = "gen2act_run"
# tags = ["lerobot"]

[infer]
checkpoint_path = "outputs/gen2act_policy/latest.pt"
demo_index = 0
start_index = 0
save_path = "outputs/gen2act_policy/infer_sample.npz"